name: Protected disposable release proof

on:
  workflow_dispatch:
    inputs:
      approved_sha:
        description: Full 40-character reviewed commit SHA
        required: true
        type: string
      confirm_disposable:
        description: Type DISPOSABLE_ONLY; proof targets are mutated or reset
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: liber-disposable-release-proof
  cancel-in-progress: false

jobs:
  geography:
    name: Geography upgrade then fresh proof
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: disposable-geography-proof
    env:
      APPROVED_SHA: ${{ inputs.approved_sha }}
      CONFIRM_DISPOSABLE: ${{ inputs.confirm_disposable }}
      DATABASE_URL: ${{ vars.SHARED_DATABASE_ID_URL_1 }}
      DIRECT_URL: ${{ vars.SHARED_DATABASE_ID_URL_2 }}
      GEOGRAPHY_MIGRATION_TEST_ALLOW_RESET: "true"
      GEOGRAPHY_MIGRATION_TEST_ALLOW_WRITES: "true"
      GEOGRAPHY_MIGRATION_TEST_DATABASE_URL: ${{ secrets.GEOGRAPHY_DATABASE_URL }}
      GEOGRAPHY_MIGRATION_TEST_PREPARE_FROM_00004: "true"
      GEOGRAPHY_MIGRATION_TEST_SENTINEL: ${{ secrets.GEOGRAPHY_SENTINEL }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ inputs.approved_sha }}
      - name: Confirm exact reviewed disposable run
        shell: bash
        run: |
          [[ "$APPROVED_SHA" =~ ^[0-9a-f]{40}$ ]]
          test "$GITHUB_SHA" = "$APPROVED_SHA"
          test "$CONFIRM_DISPOSABLE" = "DISPOSABLE_ONLY"
      - uses: actions/setup-node@v6
        with:
          cache: npm
          node-version: 24
      - run: npm install --global npm@10.9.0
      - run: npm ci
      - run: npm run db:generate
      - name: Representative upgrade proof
        run: npm run db:test-geography:upgrade
      - name: Exact fresh-chain proof
        run: npm run db:test-geography:fresh

  security:
    name: Identity, buyer, seller, and Auth/Storage proof
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment: disposable-security-proof
    env:
      APPROVED_SHA: ${{ inputs.approved_sha }}
      AUTH_SECURITY_STAGING_ALLOW_WRITES: "true"
      AUTH_SECURITY_STAGING_DATABASE_URL: ${{ secrets.SECURITY_DATABASE_URL }}
      AUTH_SECURITY_STAGING_PUBLISHABLE_KEY: ${{ vars.SECURITY_PUBLISHABLE_KEY }}
      AUTH_SECURITY_STAGING_SENTINEL: ${{ secrets.SECURITY_SENTINEL }}
      AUTH_SECURITY_STAGING_SERVICE_ROLE_KEY: ${{ secrets.SECURITY_SERVICE_ROLE_KEY }}
      AUTH_SECURITY_STAGING_SUPABASE_URL: ${{ vars.SECURITY_SUPABASE_URL }}
      BUYER_PROFILE_TEST_ALLOW_WRITES: "true"
      BUYER_PROFILE_TEST_DATABASE_URL: ${{ secrets.SECURITY_DATABASE_URL }}
      BUYER_PROFILE_TEST_SENTINEL: ${{ secrets.SECURITY_SENTINEL }}
      CONFIRM_DISPOSABLE: ${{ inputs.confirm_disposable }}
      DATABASE_URL: ${{ vars.SHARED_DATABASE_ID_URL_1 }}
      DIRECT_URL: ${{ vars.SHARED_DATABASE_ID_URL_2 }}
      IDENTITY_MIGRATION_TEST_ALLOW_WRITES: "true"
      IDENTITY_MIGRATION_TEST_DATABASE_URL: ${{ secrets.SECURITY_DATABASE_URL }}
      IDENTITY_MIGRATION_TEST_PREPARE_EMPTY: "true"
      IDENTITY_MIGRATION_TEST_SENTINEL: ${{ secrets.SECURITY_SENTINEL }}
      SELLER_PROPERTY_INTEGRITY_TEST_ALLOW_WRITES: "true"
      SELLER_PROPERTY_INTEGRITY_TEST_DATABASE_URL: ${{ secrets.SECURITY_DATABASE_URL }}
      SELLER_PROPERTY_INTEGRITY_TEST_SENTINEL: ${{ secrets.SECURITY_SENTINEL }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ inputs.approved_sha }}
      - name: Confirm exact reviewed disposable run
        shell: bash
        run: |
          [[ "$APPROVED_SHA" =~ ^[0-9a-f]{40}$ ]]
          test "$GITHUB_SHA" = "$APPROVED_SHA"
          test "$CONFIRM_DISPOSABLE" = "DISPOSABLE_ONLY"
      - uses: actions/setup-node@v6
        with:
          cache: npm
          node-version: 24
      - run: npm install --global npm@10.9.0
      - run: npm ci
      - run: npm run db:generate
      - run: npm run db:test-identity
      - run: npm run db:test-buyer-profile-atomicity
      - run: npm run db:test-seller-property-integrity
      - run: npm run db:test-auth-security:staging
